<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    #b { transform-origin: 7.5px 16px; animation: bloop-lean 3s ease-in-out infinite; }
    .dot { opacity: 0; animation: bloop-rise 1.8s ease-out infinite; }
    .d2 { animation-delay: 0.3s; } .d3 { animation-delay: 0.6s; }
    @keyframes bloop-lean { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-3deg); } }
    @keyframes bloop-rise { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 30% { opacity: 1; } 100% { opacity: 0; transform: translateY(-4px) scale(1); } }
  </style></defs>
  <ellipse cx="7.5" cy="16.2" rx="7" ry="1.1" fill="#000000" opacity="0.32"/>
  <g id="b">
    <rect x="1" y="7.5" width="13" height="8.6" rx="4.3" fill="#4fd1b5"/>
    <rect x="2" y="8" width="11" height="3" rx="2.6" fill="#7fe8d2" opacity="0.65"/>
    <rect x="4" y="9.9" width="2.6" height="3" rx="1.3" fill="#ffffff"/>
    <rect x="8.4" y="9.9" width="2.6" height="3" rx="1.3" fill="#ffffff"/>
    <circle cx="5.5" cy="10.9" r="0.85" fill="#1f3a36"/>
    <circle cx="9.9" cy="10.9" r="0.85" fill="#1f3a36"/>
    <path d="M6.6 14.2 q0.9 0.5 1.8 0" stroke="#1f3a36" stroke-width="0.45" fill="none" stroke-linecap="round"/>
  </g>
  <g fill="#9aa7b0">
    <circle class="dot" cx="12" cy="7.5" r="0.7"/>
    <circle class="dot d2" cx="13.4" cy="6.2" r="0.9"/>
    <circle class="dot d3" cx="15" cy="4.8" r="1.05"/>
  </g>
</svg>
