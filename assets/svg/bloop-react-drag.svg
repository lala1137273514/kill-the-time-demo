<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    /* Picked up: body stretched tall, wobbling side to side */
    #body-js { transform-origin: 7.5px 6px; animation: bloop-drag-sway 0.9s ease-in-out infinite alternate; }
    #stretch-js { transform-origin: 7.5px 7.5px; animation: bloop-drag-stretch 1.1s ease-in-out infinite; }
    .arm-up { transform-box: fill-box; transform-origin: bottom center; }
    .arm-l { animation: bloop-arm-l 0.5s ease-in-out infinite alternate; }
    .arm-r { animation: bloop-arm-r 0.5s ease-in-out infinite alternate; }
    #shadow-js { transform-origin: 7.5px 16.2px; animation: bloop-drag-shadow 0.9s ease-in-out infinite alternate; }
    @keyframes bloop-drag-sway { 0% { transform: rotate(-4deg); } 100% { transform: rotate(4deg); } }
    @keyframes bloop-drag-stretch { 0%,100% { transform: scale(1,1.12); } 50% { transform: scale(0.96,1.2); } }
    @keyframes bloop-arm-l { 0% { transform: rotate(-18deg); } 100% { transform: rotate(-42deg); } }
    @keyframes bloop-arm-r { 0% { transform: rotate(18deg); } 100% { transform: rotate(42deg); } }
    @keyframes bloop-drag-shadow { 0% { transform: scale(0.55); opacity: 0.16; } 100% { transform: scale(0.45); opacity: 0.12; } }
  </style></defs>
  <ellipse id="shadow-js" cx="7.5" cy="16.2" rx="7" ry="1.1" fill="#000000" opacity="0.18"/>
  <g id="body-js">
    <g id="stretch-js">
      <g class="arm-up arm-l" fill="#4fd1b5"><rect x="0.2" y="8.5" width="1.6" height="3.4" rx="0.8"/></g>
      <g class="arm-up arm-r" fill="#4fd1b5"><rect x="13.2" y="8.5" width="1.6" height="3.4" rx="0.8"/></g>
      <rect x="1.5" y="6.6" width="12" height="9.4" rx="4.7" fill="#4fd1b5"/>
      <rect x="2.5" y="7.1" width="10" height="3" rx="2.5" fill="#7fe8d2" opacity="0.65"/>
      <circle cx="3.8" cy="12.6" r="0.9" fill="#ff9bb0" opacity="0.55"/>
      <circle cx="11.2" cy="12.6" r="0.9" fill="#ff9bb0" opacity="0.55"/>
      <g id="eyes-js" fill="#1f3a36">
        <ellipse cx="5.5" cy="11.2" rx="1.2" ry="1.5"/>
        <ellipse cx="9.5" cy="11.2" rx="1.2" ry="1.5"/>
        <circle cx="5.7" cy="10.8" r="0.4" fill="#ffffff"/>
        <circle cx="9.7" cy="10.8" r="0.4" fill="#ffffff"/>
      </g>
      <ellipse cx="7.5" cy="14" rx="1" ry="1.3" fill="#1f3a36"/>
    </g>
  </g>
</svg>
