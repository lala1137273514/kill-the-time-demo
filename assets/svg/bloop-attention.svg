<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    #b { transform-origin: 7.5px 16px; animation: bloop-hop 0.72s ease-in-out infinite; }
    .spark { transform-box: fill-box; transform-origin: center; opacity: 0; animation: bloop-spark 1.1s ease-out infinite; }
    .s2 { animation-delay: 0.4s; } .s3 { animation-delay: 0.75s; }
    @keyframes bloop-hop { 0%,100% { transform: translateY(0) scale(1,1); } 35% { transform: translateY(-2.6px) scale(0.95,1.06); } 65% { transform: translateY(0) scale(1.08,0.9); } }
    @keyframes bloop-spark { 0%,100% { opacity: 0; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(45deg); } }
  </style></defs>
  <ellipse cx="7.5" cy="16.2" rx="7" ry="1.1" fill="#000000" opacity="0.3"/>
  <g id="b">
    <rect x="1" y="7.5" width="13" height="8.6" rx="4.3" fill="#4fd1b5"/>
    <rect x="2" y="8" width="11" height="3" rx="2.6" fill="#7fe8d2" opacity="0.65"/>
    <circle cx="3.4" cy="12.7" r="1" fill="#ff9bb0" opacity="0.6"/>
    <circle cx="11.6" cy="12.7" r="1" fill="#ff9bb0" opacity="0.6"/>
    <path d="M4.3 11.8 q1 -1.4 2 0" stroke="#1f3a36" stroke-width="0.55" fill="none" stroke-linecap="round"/>
    <path d="M8.7 11.8 q1 -1.4 2 0" stroke="#1f3a36" stroke-width="0.55" fill="none" stroke-linecap="round"/>
    <path d="M6 13.6 q1.5 1.6 3 0" stroke="#1f3a36" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  </g>
  <g fill="#ffd34e">
    <rect class="spark" x="0.5" y="6" width="1.4" height="1.4" rx="0.3"/>
    <rect class="spark s2" x="13" y="7.5" width="1.6" height="1.6" rx="0.3"/>
    <rect class="spark s3" x="11.5" y="4" width="1.3" height="1.3" rx="0.3"/>
  </g>
</svg>
