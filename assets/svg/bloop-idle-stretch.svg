<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    /* Calm idle: slow stretch up, squash down, tiny bounce */
    #body-js { transform-origin: 7.5px 16.2px; animation: bloop-stretch 14s ease-in-out infinite; }
    .lid { transform-box: fill-box; transform-origin: top center; animation: bloop-blink 14s infinite; }
    #shadow-js { transform-origin: 7.5px 16.2px; animation: bloop-stretch-shadow 14s ease-in-out infinite; }
    @keyframes bloop-stretch {
      0%,40%,100% { transform: scale(1,1) translateY(0); }
      18% { transform: scale(0.9,1.16) translateY(-1.6px); }
      26% { transform: scale(1.12,0.86) translateY(0.4px); }
      32% { transform: scale(0.97,1.04) translateY(-0.6px); }
    }
    @keyframes bloop-stretch-shadow {
      0%,40%,100% { transform: scaleX(1); opacity: 0.32; }
      18% { transform: scaleX(0.82); opacity: 0.22; }
      26% { transform: scaleX(1.14); opacity: 0.36; }
    }
    @keyframes bloop-blink { 0%,52%,55%,100% { transform: scaleY(0); } 53%,54% { transform: scaleY(1); } }
  </style></defs>
  <ellipse id="shadow-js" cx="7.5" cy="16.2" rx="7" ry="1.1" fill="#000000" opacity="0.32"/>
  <g id="body-js">
    <rect x="1" y="7.5" width="13" height="8.6" rx="4.3" fill="#4fd1b5"/>
    <rect x="2" y="8" width="11" height="3" rx="2.6" fill="#7fe8d2" opacity="0.65"/>
    <circle cx="3.5" cy="12.8" r="0.9" fill="#ff9bb0" opacity="0.55"/>
    <circle cx="11.5" cy="12.8" r="0.9" fill="#ff9bb0" opacity="0.55"/>
    <rect x="4" y="10.3" width="2.6" height="3" rx="1.3" fill="#ffffff"/>
    <rect x="8.4" y="10.3" width="2.6" height="3" rx="1.3" fill="#ffffff"/>
    <g id="eyes-js" fill="#1f3a36">
      <circle cx="5.3" cy="11.9" r="0.9"/>
      <circle cx="9.7" cy="11.9" r="0.9"/>
    </g>
    <rect class="lid" x="4" y="10.3" width="2.6" height="3" rx="1.3" fill="#4fd1b5"/>
    <rect class="lid" x="8.4" y="10.3" width="2.6" height="3" rx="1.3" fill="#4fd1b5"/>
    <path d="M6.4 14.1 q1.1 0.9 2.2 0" stroke="#1f3a36" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
