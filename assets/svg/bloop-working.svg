<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    #b { transform-origin: 7.5px 16px; animation: bloop-work 0.66s ease-in-out infinite; }
    .hand { transform-box: fill-box; transform-origin: center; animation: bloop-tap 0.33s infinite alternate; }
    .h2 { animation-delay: 0.16s; }
    @keyframes bloop-work { 0%,100% { transform: translateY(0) scaleX(1); } 50% { transform: translateY(-0.7px) scaleX(1.03); } }
    @keyframes bloop-tap { 0% { transform: translateY(-0.5px); } 100% { transform: translateY(0.7px); } }
  </style></defs>
  <ellipse cx="7.5" cy="16.2" rx="7" ry="1.1" fill="#000000" opacity="0.32"/>
  <rect x="2.5" y="16.4" width="10" height="1.1" rx="0.5" fill="#cfd8dc"/>
  <g id="b">
    <rect x="1" y="7.5" width="13" height="8.6" rx="4.3" fill="#4fd1b5"/>
    <rect x="2" y="8" width="11" height="3" rx="2.6" fill="#7fe8d2" opacity="0.65"/>
    <rect x="4.2" y="11" width="2.4" height="1.5" rx="0.7" fill="#1f3a36"/>
    <rect x="8.6" y="11" width="2.4" height="1.5" rx="0.7" fill="#1f3a36"/>
    <path d="M6.6 14 q0.9 0.6 1.8 0" stroke="#1f3a36" stroke-width="0.45" fill="none" stroke-linecap="round"/>
    <rect class="hand" x="2.4" y="15" width="2" height="1.6" rx="0.8" fill="#3bbfa3"/>
    <rect class="hand h2" x="10.6" y="15" width="2" height="1.6" rx="0.8" fill="#3bbfa3"/>
  </g>
</svg>
