<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: "Segoe UI Variable", "Segoe UI", -apple-system, BlinkMacSystemFont,
      "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
    color: rgba(248,250,252,0.96);
    -webkit-font-smoothing: antialiased;
  }
  :root {
    --panel: rgba(22, 26, 31, 0.78);
    --line: rgba(255, 255, 255, 0.13);
    --line-strong: rgba(255, 255, 255, 0.23);
    --text: rgba(248, 250, 252, 0.96);
    --muted: rgba(226, 232, 240, 0.66);
    --accent: #7dd3fc;
  }
  #card {
    margin: 8px;
    height: calc(100vh - 16px);
    display: flex;
    flex-direction: column;
    padding: 12px 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.025) 42%, transparent),
      var(--panel);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    backdrop-filter: saturate(180%) blur(22px);
    border: 1px solid var(--line);
    border-top-color: rgba(255,255,255,0.25);
    border-radius: 8px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.30), 0 1px 0 rgba(255,255,255,0.055) inset;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px) scale(0.98);
    transform-origin: bottom center;
    transition: opacity 160ms ease, transform 190ms cubic-bezier(0.16, 1, 0.28, 1);
  }
  #card.show { opacity: 1; transform: translateY(0) scale(1); }
  /* a soft breathing glow while a step is in flight (non-terminal) */
  #card.live { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 50% { border-color: rgba(125, 211, 252, 0.42); } }

  .row { display: flex; align-items: center; gap: 8px; }
  #emoji { font-size: 18px; line-height: 1; flex: 0 0 auto; }

  /* status mode: one wrapping line, no truncation */
  #status {
    font-size: 13px;
    font-weight: 720;
    line-height: 1.35;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  #speech {
    margin-top: 8px;
    font-size: 12.5px;
    font-weight: 650;
    line-height: 1.45;
    color: var(--text);
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* activity mode: the "visible terminal" — a scrolling list of action lines */
  #activity {
    flex: 1 1 auto;
    margin-top: 8px;
    overflow-y: auto;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", monospace;
    font-size: 11.5px;
    line-height: 1.5;
    color: rgba(226, 232, 240, 0.88);
  }
  #activity::-webkit-scrollbar { width: 6px; }
  #activity::-webkit-scrollbar-track { background: transparent; }
  #activity::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.14); border-radius: 3px; }
  #activity::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.24); }
  .act-line {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    padding: 1px 0;
  }
  .act-line::before { content: "› "; color: rgba(125, 211, 252, 0.82); }

  /* chat mode: full, readable, wrapped assistant reply */
  #chat {
    flex: 1 1 auto;
    margin-top: 8px;
    overflow-y: auto;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.14); border-radius: 3px; }
  #chat::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.24); }

  /* permission mode: a summary line + two buttons */
  #perm-summary {
    flex: 1 1 auto;
    margin-top: 8px;
    overflow-y: auto;
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  #perm-buttons {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex: 0 0 auto;
  }
  .perm-btn {
    flex: 1 1 0;
    height: 34px;
    border-radius: 7px;
    border: 1px solid transparent;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.12s ease, background 0.12s ease;
  }
  .perm-btn.approve {
    background: rgba(125, 211, 252, 0.92);
    color: #07111a;
  }
  .perm-btn.approve:hover { filter: brightness(1.08); }
  .perm-btn.deny {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.16);
    color: #fff;
  }
  .perm-btn.deny:hover { background: rgba(255, 255, 255, 0.14); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="card">
  <div class="row">
    <span id="emoji"></span>
    <span id="status"></span>
  </div>
  <div id="speech" class="hidden"></div>
  <div id="activity" class="hidden"></div>
  <div id="chat" class="hidden"></div>
  <div id="perm-summary" class="hidden"></div>
  <div id="perm-buttons" class="hidden">
    <button id="perm-approve" class="perm-btn approve">批准</button>
    <button id="perm-deny" class="perm-btn deny">拒绝</button>
  </div>
</div>
<script src="glassbox-card-renderer.js"></script>
</body>
</html>
