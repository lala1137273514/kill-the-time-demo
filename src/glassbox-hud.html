<!doctype html>
<html><head><meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; background: transparent; overflow: hidden;
    font-family: "Segoe UI Variable", "Segoe UI", -apple-system, BlinkMacSystemFont,
      "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
    color: rgba(248, 250, 252, 0.96);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  body { display: flex; align-items: flex-end; justify-content: center; padding: 6px; }

  :root {
    --panel: rgba(22, 26, 31, 0.78);
    --panel-soft: rgba(255, 255, 255, 0.055);
    --line: rgba(255, 255, 255, 0.13);
    --line-strong: rgba(255, 255, 255, 0.24);
    --text: rgba(248, 250, 252, 0.96);
    --muted: rgba(226, 232, 240, 0.64);
    --subtle: rgba(226, 232, 240, 0.48);
    --accent: #7dd3fc;
    --good: #5ee3a1;
    --warn: #f8c471;
    --bad: #ff7a8a;
  }

  #hud {
    width: 100%;
    display: grid;
    gap: 7px;
    opacity: 0;
    transform: translateY(10px) scale(0.965);
    transform-origin: bottom center;
    transition: opacity 120ms ease-in, transform 120ms ease-in;
    will-change: opacity, transform;
  }
  #hud.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition: opacity 190ms ease-out, transform 230ms cubic-bezier(0.16, 1, 0.28, 1);
  }

  .hud-card {
    min-width: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.092), rgba(255,255,255,0.026) 45%, transparent),
      var(--panel);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    backdrop-filter: saturate(180%) blur(22px);
    border: 1px solid var(--line);
    border-top-color: rgba(255,255,255,0.24);
    border-radius: 8px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.30), 0 1px 0 rgba(255,255,255,0.055) inset;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 145ms ease, transform 180ms cubic-bezier(0.16, 1, 0.28, 1), border-color 120ms ease;
  }
  #hud.show .hud-card { opacity: 1; transform: translateY(0); }
  #hud.show .status-card { transition-delay: 20ms; }
  #hud.show .usage-card { transition-delay: 55ms; }
  #hud.show .action-card { transition-delay: 90ms; }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
    color: var(--subtle);
    font-size: 9.5px;
    line-height: 1;
    font-weight: 760;
    letter-spacing: 0;
  }
  .card-head span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-card {
    height: 96px;
    padding: 8px 10px 9px;
    display: grid;
    grid-template-columns: 10px 1fr auto;
    grid-template-rows: auto auto auto 1fr;
    gap: 4px 8px;
    align-items: center;
  }
  .status-dot {
    grid-row: 1 / 3;
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.34);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
  }
  .status-dot.running { background: var(--good); animation: dotPulse 1.5s ease-in-out infinite; }
  .status-dot.attention { background: var(--warn); animation: dotPulse 1.15s ease-in-out infinite; }
  .status-dot.done { background: var(--accent); }
  .status-dot.bad { background: var(--bad); animation: dotPulse 1.05s ease-in-out infinite; }
  @keyframes dotPulse { 50% { transform: scale(0.72); opacity: 0.62; } }
  .status-main {
    min-width: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    grid-column: 2 / 4;
    gap: 8px;
    align-items: center;
  }
  .status-agent, .status-phase, .status-detail, .status-recent, .status-chip,
  .session-title, .session-state {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status-agent { color: var(--muted); font-size: 10px; font-weight: 760; }
  .status-phase { color: var(--text); font-size: 12.5px; font-weight: 760; line-height: 1; }
  .status-detail {
    grid-column: 2 / 4;
    color: rgba(248,250,252,0.84);
    font-size: 11px;
    line-height: 1.05;
  }
  .status-recent {
    grid-column: 2 / 4;
    color: var(--subtle);
    font-size: 10px;
    line-height: 1.05;
  }
  .status-chip {
    max-width: 76px;
    padding: 3px 7px 4px;
    border-radius: 999px;
    background: rgba(125, 211, 252, 0.08);
    border: 1px solid rgba(125, 211, 252, 0.15);
    color: rgba(219, 244, 255, 0.88);
    font-size: 9.5px;
    line-height: 1;
    font-weight: 760;
  }
  .status-stack {
    grid-column: 1 / 4;
    min-width: 0;
    align-self: end;
    display: grid;
    gap: 2px;
  }
  .session-line {
    min-width: 0;
    height: 13px;
    display: grid;
    grid-template-columns: 7px minmax(0, 1fr) auto;
    gap: 5px;
    align-items: center;
    color: var(--muted);
    font-size: 9.5px;
    line-height: 1;
  }
  .session-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.34);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.045);
  }
  .session-dot.running { background: var(--good); }
  .session-dot.attention { background: var(--warn); }
  .session-dot.done { background: var(--accent); }
  .session-dot.bad { background: var(--bad); }
  .session-title { min-width: 0; color: rgba(248,250,252,0.82); }
  .session-state {
    max-width: 58px;
    color: var(--subtle);
    font-size: 9px;
    font-weight: 760;
    text-align: right;
  }

  .usage-card {
    min-height: 98px;
    max-height: 132px;
    padding: 9px 10px 10px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 8px;
  }
  .usage-grid {
    display: grid;
    gap: 5px;
    min-width: 0;
    overflow: hidden;
  }
  .usage-row {
    min-width: 0;
    display: grid;
    grid-template-columns: 48px 38px 1fr 38px;
    gap: 7px;
    align-items: center;
    font-size: 10.5px;
    line-height: 1;
  }
  .usage-row-static { grid-template-columns: 48px 38px 1fr 38px; }
  .usage-name { color: rgba(248,250,252,0.84); font-weight: 760; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .usage-window { color: var(--subtle); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .usage-meta { color: rgba(248,250,252,0.78); text-align: right; font-weight: 760; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .usage-bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,0.12); overflow: hidden; }
  .usage-bar > i { display: block; height: 100%; border-radius: inherit; background: var(--accent); transition: width 180ms ease; }
  .usage-bar.orange > i { background: var(--warn); }
  .usage-bar.red > i { background: var(--bad); }
  .usage-note { color: var(--muted); font-size: 10.5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .action-card {
    height: 44px;
    padding: 5px;
  }
  .toolbar {
    height: 100%;
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    align-items: center;
    gap: 5px;
  }
  .hud-btn {
    width: 100%;
    height: 34px;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-soft);
    border: 1px solid rgba(255,255,255,0.075);
    border-radius: 7px;
    color: rgba(248,250,252,0.9);
    cursor: pointer;
    transition: background 110ms ease, border-color 110ms ease, transform 110ms ease, color 110ms ease;
  }
  .hud-btn svg { width: 15.5px; height: 15.5px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .hud-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: var(--line-strong);
    color: #fff;
    transform: translateY(-1px);
  }
  .hud-btn:active { transform: translateY(0) scale(0.97); }
</style></head>
<body>
<div id="hud">
  <section class="hud-card status-card">
    <i id="statusDot" class="status-dot quiet"></i>
    <div class="status-main">
      <div id="statusAgent" class="status-agent">Clawd</div>
      <div id="statusChip" class="status-chip">idle</div>
    </div>
    <div id="statusPhase" class="status-phase">待命</div>
    <div id="statusDetail" class="status-detail">鼠标靠近就会醒来</div>
    <div id="statusRecent" class="status-recent">眼动 / 呼吸 / 睡眠序列就绪</div>
    <div id="statusStack" class="status-stack"></div>
  </section>

  <section class="hud-card usage-card">
    <div class="card-head"><b>用量</b><span id="usageMeta">读取中</span></div>
    <div id="usageGrid" class="usage-grid">
      <div class="usage-note">加载中...</div>
    </div>
  </section>

  <section class="hud-card action-card">
    <div id="toolbar" class="toolbar"></div>
  </section>
</div>
<script src="glassbox-hud-renderer.js"></script>
</body></html>
