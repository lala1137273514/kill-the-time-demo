<!doctype html>
<html><head><meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; }
  #card { margin: 8px; padding: 12px 14px; background: rgba(28,28,30,0.97); border: 1px solid rgba(120,170,255,0.28);
          border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.45); color: #fff; }
  #head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  #title { font-size: 12px; font-weight: 600; opacity: 0.85; }
  #refresh { font-size: 13px; opacity: 0.55; cursor: pointer; background: none; border: none; color: #fff; line-height: 1; }
  #refresh:hover { opacity: 1; }
  .row { margin-top: 8px; }
  .row .toprow { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .row.primary .toprow { font-size: 13px; font-weight: 600; }
  .reset { opacity: 0.6; font-variant-numeric: tabular-nums; }
  .bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
  .row.primary .bar { height: 9px; }
  .bar > i { display: block; height: 100%; border-radius: 3px; background: #5ed1ff; transition: width 200ms ease; }
  .bar.orange > i { background: #ffb84e; }
  .bar.red > i { background: #ff5e5e; }
  #weekly { margin-top: 6px; opacity: 0.9; }
  #state { font-size: 12px; opacity: 0.8; padding: 6px 0; }
  #codex { margin-top: 10px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.1); }
  .codex-row { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
  .codex-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.28); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
  .codex-dot.ok { background: #5ee3a1; }
  .codex-title { font-size: 12px; font-weight: 650; line-height: 1.2; }
  .codex-msg { margin-top: 3px; font-size: 11px; line-height: 1.25; opacity: 0.65; }
  .codex-windows { margin-top: 2px; }
  .codex-windows .row { margin-top: 7px; }
  .hidden { display: none; }
</style></head>
<body>
<div id="card">
  <div id="head"><span id="title">AI 用量</span><button id="refresh" title="刷新">↻</button></div>
  <div id="state" class="hidden"></div>
  <div id="primary" class="hidden"></div>
  <div id="weekly" class="hidden"></div>
  <div id="codex" class="hidden"></div>
</div>
<script src="quota-popup-renderer.js"></script>
</body></html>
